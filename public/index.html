<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>التحقق من الحساب</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
            padding: 28px 24px;
            text-align: center;
        }
        .icon { font-size: 64px; margin-bottom: 16px; }
        h1 { color: #1a1a2e; margin-bottom: 8px; font-size: 24px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 24px; }
        .info-card {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e9ecef;
        }
        .info-item:last-child { border-bottom: none; }
        .info-label { font-weight: 600; color: #495057; font-size: 14px; }
        .info-value { color: #212529; font-family: monospace; font-size: 13px; word-break: break-all; text-align: right; max-width: 60%; }
        .status { padding: 12px; border-radius: 12px; margin: 20px 0; font-size: 14px; }
        .status.loading { background: #e3f2fd; color: #1565c0; border: 1px solid #90caf9; }
        .status.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .status.warning { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .footer { margin-top: 20px; font-size: 11px; color: #999; }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="icon">🛡️</div>
        <h1>التحقق من الحساب</h1>
        <p class="subtitle">جاري التحقق من معلومات جهازك</p>

        <div class="info-card">
            <div class="info-item">
                <span class="info-label">🆔 معرف الجهاز</span>
                <span class="info-value" id="fingerprint">جاري الحساب...</span>
            </div>
            <div class="info-item">
                <span class="info-label">🌐 عنوان IP</span>
                <span class="info-value" id="ip">جاري الجلب...</span>
            </div>
            <div class="info-item">
                <span class="info-label">📱 الجهاز</span>
                <span class="info-value" id="device">جاري الجلب...</span>
            </div>
            <div class="info-item">
                <span class="info-label">🌍 المتصفح</span>
                <span class="info-value" id="browser">جاري الجلب...</span>
            </div>
        </div>

        <div id="status" class="status loading">
            <span class="loader"></span> جاري التحقق...
        </div>

        <button id="verifyBtn" class="btn" onclick="verifyAndSend()" disabled>
            ✅ تأكيد والمتابعة
        </button>

        <div class="footer">
            هذا الإجراء ضروري لحماية حسابك ومنع الاحتيال
        </div>
    </div>

    <script>
        let webApp = window.Telegram.WebApp;
        let deviceData = {};
        
        webApp.ready();
        webApp.expand();
        
        // الحصول على بصمة الجهاز
        async function getFingerprint() {
            try {
                const fp = await FingerprintJS.load();
                const result = await fp.get();
                return result.visitorId;
            } catch (error) {
                console.error("Fingerprint error:", error);
                return generateSimpleFingerprint();
            }
        }
        
        function generateSimpleFingerprint() {
            const data = [
                navigator.userAgent,
                screen.width + 'x' + screen.height,
                screen.colorDepth,
                navigator.language,
                navigator.hardwareConcurrency || 'unknown',
                Intl.DateTimeFormat().resolvedOptions().timeZone
            ].join('|');
            
            let hash = 0;
            for (let i = 0; i < data.length; i++) {
                const char = data.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(16);
        }
        
        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch {
                return 'غير معروف';
            }
        }
        
        function getDeviceInfo() {
            const ua = navigator.userAgent;
            if (/(iPhone|iPad|iPod)/i.test(ua)) return 'iOS';
            if (/Android/i.test(ua)) return 'Android';
            if (/Windows/i.test(ua)) return 'Windows';
            if (/Mac/i.test(ua)) return 'macOS';
            if (/Linux/i.test(ua)) return 'Linux';
            return 'غير معروف';
        }
        
        function getBrowserInfo() {
            const ua = navigator.userAgent;
            if (ua.includes('Chrome')) return 'Chrome';
            if (ua.includes('Firefox')) return 'Firefox';
            if (ua.includes('Safari')) return 'Safari';
            if (ua.includes('Edge')) return 'Edge';
            if (ua.includes('Opera')) return 'Opera';
            return 'غير معروف';
        }
        
        async function verifyAndSend() {
            const btn = document.getElementById('verifyBtn');
            const statusDiv = document.getElementById('status');
            
            btn.disabled = true;
            statusDiv.className = 'status loading';
            statusDiv.innerHTML = '<span class="loader"></span> جاري الإرسال...';
            
            try {
                const user = webApp.initDataUnsafe?.user;
                
                if (!user || !user.id) {
                    throw new Error('الرجاء فتح هذه الصفحة من داخل تطبيق Telegram');
                }
                
                console.log("Sending request to /verify...");
                
                const response = await fetch('/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: user.id,
                        ip: deviceData.ip,
                        fingerprint: deviceData.fingerprint,
                        device_info: deviceData.deviceInfo,
                        browser: deviceData.browser,
                        screen_resolution: `${screen.width}x${screen.height}`,
                        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                        language: navigator.language
                    })
                });
                
                console.log("Response status:", response.status);
                
                // ✅ التحقق من صحة الاستجابة
                if (!response.ok) {
                    throw new Error(`Server error: ${response.status}`);
                }
                
                // ✅ قراءة النص أولاً لتجنب خطأ JSON
                const text = await response.text();
                console.log("Response text:", text);
                
                if (!text || text.trim() === '') {
                    throw new Error('Empty response from server');
                }
                
                // ✅ تحويل النص إلى JSON
                const result = JSON.parse(text);
                console.log("Parsed result:", result);
                
                if (result.status === "success" && result.verified === true) {
                    statusDiv.className = 'status success';
                    statusDiv.innerHTML = '✅ تم التحقق بنجاح! جاري تحويلك...';
                    
                    // إغلاق WebApp
                    webApp.close();
                    
                    // إرسال المستخدم إلى البوت
                    setTimeout(() => {
                        window.location.href = `https://t.me/${result.bot_username}?start=verified_${user.id}_${result.token}`;
                    }, 1000);
                    
                } else if (result.status === "blocked") {
                    statusDiv.className = 'status error';
                    statusDiv.innerHTML = `🚫 ${result.message}`;
                    btn.disabled = true;
                } else {
                    throw new Error(result.message || 'فشل التحقق');
                }
                
            } catch (error) {
                console.error("Error:", error);
                statusDiv.className = 'status error';
                statusDiv.innerHTML = `❌ خطأ: ${error.message}`;
                btn.disabled = false;
            }
        }
        
        async function init() {
            const statusDiv = document.getElementById('status');
            const btn = document.getElementById('verifyBtn');
            
            try {
                deviceData.fingerprint = await getFingerprint();
                deviceData.ip = await getIP();
                deviceData.deviceInfo = getDeviceInfo();
                deviceData.browser = getBrowserInfo();
                
                document.getElementById('fingerprint').textContent = deviceData.fingerprint.substring(0, 20) + '...';
                document.getElementById('ip').textContent = deviceData.ip;
                document.getElementById('device').textContent = deviceData.deviceInfo;
                document.getElementById('browser').textContent = deviceData.browser;
                
                statusDiv.className = 'status success';
                statusDiv.innerHTML = '✅ تم جمع معلومات جهازك بنجاح';
                btn.disabled = false;
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = `❌ خطأ: ${error.message}`;
                console.error(error);
            }
        }
        
        init();
    </script>
</body>
</html>
