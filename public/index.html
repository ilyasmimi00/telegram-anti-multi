<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .error-icon { color: #f87171; font-size: 80px; margin: 20px 0; }
        .success-icon { color: #4ade80; font-size: 80px; margin: 20px 0; }
        .blocked-icon { color: #f59e0b; font-size: 80px; margin: 20px 0; }
        .spinner {
            width: 60px; height: 60px;
            border: 5px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .ip-box {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
        }
        .ip-address {
            font-family: 'Courier New', monospace;
            font-size: 20px;
            font-weight: bold;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 10px;
            display: inline-block;
        }
        .button {
            background: white;
            color: #764ba2;
            border: none;
            padding: 16px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }
        .steps {
            display: flex;
            justify-content: space-between;
            margin: 30px 0;
            position: relative;
        }
        .step {
            flex: 1;
            text-align: center;
            z-index: 2;
        }
        .step-number {
            width: 40px; height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-weight: bold;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .step.active .step-number { background: white; color: #764ba2; border-color: white; }
        .step.completed .step-number { background: #4ade80; border-color: #4ade80; color: white; }
        .step-label { font-size: 14px; opacity: 0.8; }
        .steps-line {
            position: absolute; top: 20px; left: 15%; right: 15%; height: 2px;
            background: rgba(255,255,255,0.2); z-index: 1;
        }
        .steps-line-fill { height: 100%; background: #4ade80; transition: width 0.5s ease; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 التحقق من الجهاز</h2>
        <div class="steps">
            <div class="step active" id="step1"><div class="step-number">1</div><div class="step-label">قراءة البيانات</div></div>
            <div class="step" id="step2"><div class="step-number">2</div><div class="step-label">التحقق</div></div>
            <div class="step" id="step3"><div class="step-number">3</div><div class="step-label">النتيجة</div></div>
            <div class="steps-line"><div class="steps-line-fill" id="progressLine" style="width: 0%;"></div></div>
        </div>
        <div id="content"><div class="spinner"></div><p class="info-text">جاري التحقق...</p></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // 🔴🔴🔴 استخدم API الخاص بـ Render 🔴🔴🔴
        const API_URL = "https://telegram-anti-multi.onrender.com/verify";

        function getUserId() {
            let user_id = tg.initDataUnsafe?.user?.id;
            if (user_id) {
                console.log('✅ User ID from Telegram:', user_id);
                return user_id;
            }
            const urlParams = new URLSearchParams(window.location.search);
            user_id = urlParams.get('user_id');
            if (user_id) {
                console.log('✅ User ID from URL:', user_id);
                return user_id;
            }
            console.log('❌ No user_id found');
            return null;
        }

        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (error) {
                console.log('Error getting IP:', error);
                return 'unknown';
            }
        }

        function getFingerprint() {
            const components = [
                screen.width + 'x' + screen.height, screen.colorDepth, navigator.language,
                navigator.platform, navigator.hardwareConcurrency, navigator.deviceMemory || 'unknown',
                new Date().getTimezoneOffset(), navigator.userAgent
            ];
            const data = components.join('|');
            let hash = 0;
            for (let i = 0; i < data.length; i++) {
                const char = data.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(16);
        }

        function updateStep(step) {
            document.getElementById('step1').classList.remove('active', 'completed');
            document.getElementById('step2').classList.remove('active', 'completed');
            document.getElementById('step3').classList.remove('active', 'completed');
            if (step === 1) {
                document.getElementById('step1').classList.add('active');
                document.getElementById('progressLine').style.width = '0%';
            } else if (step === 2) {
                document.getElementById('step1').classList.add('completed');
                document.getElementById('step2').classList.add('active');
                document.getElementById('progressLine').style.width = '50%';
            } else if (step === 3) {
                document.getElementById('step1').classList.add('completed');
                document.getElementById('step2').classList.add('completed');
                document.getElementById('step3').classList.add('active');
                document.getElementById('progressLine').style.width = '100%';
            }
        }

        async function main() {
            const content = document.getElementById('content');
            
            const user_id = getUserId();
            
            if (!user_id) {
                content.innerHTML = `
                    <div class="error-icon">❌</div>
                    <h3>خطأ في التحقق</h3>
                    <p class="info-text">لم يتم العثور على معرف المستخدم</p>
                    <p class="info-text">الرجاء فتح هذه الصفحة من داخل البوت</p>
                    <button class="button" onclick="tg.close()">إغلاق</button>
                `;
                return;
            }

            updateStep(1);
            const ip = await getIP();
            const fingerprint = getFingerprint();

            content.innerHTML = `
                <div class="ip-box">
                    <div>معرف المستخدم: ${user_id}</div>
                    <div class="ip-address">${ip}</div>
                    <div style="font-size:12px;margin-top:10px;">بصمة: ${fingerprint.substring(0, 16)}...</div>
                </div>
                <div class="spinner"></div>
                <p>جاري إرسال البيانات...</p>
            `;
            updateStep(2);

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: user_id,
                        ip: ip,
                        fingerprint: fingerprint,
                        user_agent: navigator.userAgent,
                        timestamp: Date.now()
                    })
                });

                const result = await response.json();
                console.log('API Response:', result);
                updateStep(3);

                if (result.status === 'success' && result.verified === true) {
                    content.innerHTML = `
                        <div class="success-icon">✅</div>
                        <h3>تم التحقق بنجاح!</h3>
                        <div class="ip-box"><div class="ip-address">${ip}</div></div>
                        <p>يمكنك العودة إلى البوت الآن</p>
                        <button class="button" onclick="tg.close()">العودة للبوت</button>
                    `;
                } else if (result.status === 'blocked') {
                    content.innerHTML = `
                        <div class="blocked-icon">⚠️</div>
                        <h3>تم رفض التحقق</h3>
                        <p>${result.message || 'تم اكتشاف أكثر من حساب'}</p>
                        <button class="button" onclick="tg.close()">إغلاق</button>
                    `;
                } else {
                    throw new Error(result.message || 'فشل التحقق');
                }
            } catch (error) {
                console.error('Error:', error);
                content.innerHTML = `
                    <div class="error-icon">❌</div>
                    <h3>فشل التحقق</h3>
                    <p>${error.message}</p>
                    <button class="button" onclick="location.reload()">إعادة المحاولة</button>
                    <button class="button" onclick="tg.close()">العودة للبوت</button>
                `;
            }
        }

        main();
    </script>
</body>
</html>
